<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 240px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1e293b;
      color: #f1f5f9;
      margin: 0;
      padding: 12px;
    }
    h1 { font-size: 14px; margin: 0 0 10px; color: #94a3b8; }
    button {
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
      min-height: 16px;
      word-break: break-word;
    }
    #status.error { color: #f87171; }
    #port-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    #port-row label { color: #64748b; font-size: 11px; white-space: nowrap; }
    #port-input {
      width: 60px;
      background: #334155;
      color: #f1f5f9;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 2px 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Chess Analyzer</h1>
  <div id="port-row">
    <label for="port-input">Port:</label>
    <input id="port-input" type="number" value="5173" min="1" max="65535" />
  </div>
  <button id="btn">Partie analysieren</button>
  <div id="status">Auf einer chess.com/game/…-Seite öffnen.</div>
  <script src="popup.js"></script>
</body>
</html>
