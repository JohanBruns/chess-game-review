<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 240px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1e293b;
      color: #f1f5f9;
      margin: 0;
      padding: 12px;
    }
    h1 { font-size: 14px; margin: 0 0 10px; color: #94a3b8; }
    button {
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
      min-height: 16px;
      word-break: break-word;
    }
    #status.error { color: #f87171; }
    #url-row {
      margin-bottom: 10px;
    }
    #url-row label { color: #64748b; font-size: 11px; display: block; margin-bottom: 3px; }
    #url-input {
      width: 100%;
      box-sizing: border-box;
      background: #334155;
      color: #f1f5f9;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>Chess Analyzer</h1>
  <div id="url-row">
    <label for="url-input">App-URL:</label>
    <input id="url-input" type="text" value="https://chess-game-review-drab.vercel.app" />
  </div>
  <div id="url-row">
    <label for="user-input">chess.com-Benutzername:</label>
    <input id="user-input" type="text" placeholder="z.B. jojo2go" />
  </div>
  <button id="btn">Partie analysieren</button>
  <div id="status">Auf einer chess.com/game/…-Seite öffnen.</div>
  <script src="popup.js"></script>
</body>
</html>
